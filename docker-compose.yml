version: '3.8'

services:
  codeatlas-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/codeatlas
      - JWT_SECRET=supersecretjwtkeychangeinproduction
      - JWT_REFRESH_SECRET=supersecretrefreshjwtkeychangeinproduction
      - UPLOAD_PATH=uploads
      - MAX_UPLOAD_SIZE=52428800
    depends_on:
      - mongodb
    volumes:
      - codeatlas-uploads:/app/backend/uploads
      - codeatlas-projects:/app/backend/projects

  mongodb:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - codeatlas-db:/data/db

volumes:
  codeatlas-db:
  codeatlas-uploads:
  codeatlas-projects:
